{% load i18n %}
<nav class="navbar navbar-expand-lg navbar-dark bg-success bg-gradient p-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'project_list' %}">{% trans "Project Management" %}</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'project_list' %}">{% trans "Home" %}</a>
        </li>
      </ul>
      {% if user.is_authenticated %}
        <ul class="navbar-nav mb-2 mb-lg-0 me-3">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              {{ user.username }}
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">{% trans "Profile" %}</a></li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                  {% csrf_token %}
                  <button type="submit" class="dropdown-item">
                    {% trans "Logout" %}
                  </button>
                </form>
              </li>
            </ul>
          </li>
        </ul>
        <form class="d-flex ms-auto" method="get" action="{% url 'project_list' %}">
          <div class="input-group">
            <input class="form-control" type="text" name="q" placeholder="{% trans 'Search' %}" value="{{ request.GET.q }}">
            <button class="btn btn-outline-light" type="submit">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </form>
      {% else %}
        <a class="btn btn-outline-light ms-auto" href="{% url 'login' %}">{% trans "Log In" %}</a>
      {% endif %}
    </div>
  </div>
</nav>
