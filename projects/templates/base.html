<!doctype html>
<html class="h-100" lang="ar" dir="rtl">
    <head>

        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="description" content="A simple project manager.">
        <meta name="keywords" content="project , manager , django , python , django project manager , Project , learn , learnning , project manager">
        <meta name="author" content="Osamah Abdulraheem">
        <title>Django Project Manager</title>

        <!-- Bootstrap CSS -->

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        >
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        {% include "partial/header.html" %}
        {% if messages %}
        <div class="container mt-3">
            {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
        {% endif %}
        <main class="flex-shrink-0">
            <div class="container mt-5">
                {% block content %}{% endblock %}
            </div>
        </main>
        {% include "partial/footer.html" %}
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous">
        </script>
    </body>
</html>
