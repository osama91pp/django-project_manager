{% extends "base.html" %}
{% load i18n %}
{% block content %}
<div class="container">
    <div class="row mt-5">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">{{ object.name }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {% include "common/form.html" with form=form %}
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> {% trans "Save" %}
                        </button>
                        <a href="{% url 'project_delete' object.id %}" class="btn btn-danger ms-2">
                            <i class="bi bi-trash"></i> {% trans "Delete" %}
                        </a>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            {% include "project/task.html" with project=object %}
        </div>
    </div>
</div>
{% endblock content %}
